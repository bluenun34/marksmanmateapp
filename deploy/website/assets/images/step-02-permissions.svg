<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" role="img" aria-label="Allow installs from Chrome in Android settings">
  <rect width="260" height="480" rx="28" fill="#1a2332"/>
  <rect x="12" y="12" width="236" height="456" rx="20" fill="#f4f6f9"/>
  <rect x="90" y="24" width="80" height="8" rx="4" fill="#d8dee8"/>
  <text x="24" y="58" fill="#1a2332" font-family="Segoe UI,sans-serif" font-size="12" font-weight="600">Settings</text>
  <rect x="16" y="68" width="228" height="48" rx="10" fill="#fff" stroke="#d8dee8"/>
  <circle cx="40" cy="92" r="14" fill="#4285f4"/>
  <text x="62" y="88" fill="#1a2332" font-family="Segoe UI,sans-serif" font-size="11" font-weight="600">Chrome</text>
  <text x="62" y="102" fill="#5c6778" font-family="Segoe UI,sans-serif" font-size="9">Your browser</text>
  <text x="210" y="96" fill="#5c6778" font-family="Segoe UI,sans-serif" font-size="14">:</text>
  <rect x="16" y="130" width="228" height="200" rx="10" fill="#fff" stroke="#c9922a" stroke-width="2"/>
  <text x="24" y="155" fill="#1a2332" font-family="Segoe UI,sans-serif" font-size="11" font-weight="600">Install unknown apps</text>
  <rect x="150" y="140" width="80" height="28" rx="14" fill="#2d7a4f"/>
  <circle cx="218" cy="154" r="10" fill="#fff"/>
  <text x="24" y="180" fill="#5c6778" font-family="Segoe UI,sans-serif" font-size="9">Allow from this source</text>
  <path d="M130 340 L130 380" stroke="#c9922a" stroke-width="3"/>
  <polygon points="130,388 124,378 136,378" fill="#c9922a"/>
  <rect x="24" y="400" width="212" height="48" rx="10" fill="#e8f5ee"/>
  <text x="130" y="422" text-anchor="middle" fill="#2d7a4f" font-family="Segoe UI,sans-serif" font-size="10" font-weight="600">Turn ON for Chrome</text>
  <text x="130" y="438" text-anchor="middle" fill="#5c6778" font-family="Segoe UI,sans-serif" font-size="9">(or the browser you used)</text>
</svg>
