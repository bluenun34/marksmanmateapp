<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 480" role="img" aria-label="Tap Install on the Android install screen">
  <rect width="260" height="480" rx="28" fill="#1a2332"/>
  <rect x="12" y="12" width="236" height="456" rx="20" fill="#f4f6f9"/>
  <rect x="90" y="24" width="80" height="8" rx="4" fill="#d8dee8"/>
  <text x="130" y="70" text-anchor="middle" fill="#1a2332" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">Install app?</text>
  <circle cx="130" cy="120" r="36" fill="#3d5a80"/>
  <text x="130" y="128" text-anchor="middle" fill="#fff" font-family="Segoe UI,sans-serif" font-size="22" font-weight="700">MM</text>
  <text x="130" y="175" text-anchor="middle" fill="#1a2332" font-family="Segoe UI,sans-serif" font-size="14" font-weight="600">MarksmanMate</text>
  <text x="130" y="195" text-anchor="middle" fill="#5c6778" font-family="Segoe UI,sans-serif" font-size="10">This app will be installed</text>
  <rect x="40" y="230" width="180" height="48" rx="24" fill="#2d7a4f" stroke="#c9922a" stroke-width="3"/>
  <text x="130" y="260" text-anchor="middle" fill="#fff" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700">Install</text>
  <path d="M130 290 L130 330" stroke="#c9922a" stroke-width="3"/>
  <polygon points="130,338 124,328 136,328" fill="#c9922a"/>
  <rect x="40" y="350" width="180" height="40" rx="20" fill="#fff" stroke="#d8dee8"/>
  <text x="130" y="375" text-anchor="middle" fill="#5c6778" font-family="Segoe UI,sans-serif" font-size="12">Cancel</text>
  <text x="130" y="420" text-anchor="middle" fill="#2d7a4f" font-family="Segoe UI,sans-serif" font-size="11" font-weight="600">Tap Install (green button)</text>
</svg>
